apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        # NGINX Container
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf

        # OpenTelemetry Collector Sidecar
        - name: otel-collector
          envFrom:
          - configMapRef:
              name: external-configmap
              namespace: monitoring

      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-conf
